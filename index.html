<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lc's space</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #d4c9b8;
      font-family: 'Noto Serif SC', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 64px;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(48px, 10vw, 80px);
      color: #f0ebe3;
      letter-spacing: 6px;
      line-height: 1;
    }

    .tagline {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 4px;
      color: rgba(212,201,184,0.4);
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(212,201,184,0.2);
      margin: 48px auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 720px;
    }

    .item {
      border: 1px solid rgba(212,201,184,0.1);
      border-radius: 4px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.3s, background 0.3s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item:hover {
      border-color: rgba(212,201,184,0.35);
      background: rgba(212,201,184,0.03);
    }

    .item-icon { font-size: 22px; }

    .item-title {
      font-size: 15px;
      letter-spacing: 2px;
      color: #f0ebe3;
    }

    .item-desc {
      font-size: 12px;
      color: rgba(212,201,184,0.4);
      letter-spacing: 1px;
      line-height: 1.7;
    }

    footer {
      margin-top: 72px;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(212,201,184,0.2);
    }
  </style>
</head>
<body>

  <header>
    <div class="name">lc</div>
    <div class="tagline">a small corner of the web</div>
  </header>

  <div class="divider"></div>

  <div class="grid">
    <a class="item" href="520-love.html">
      <span class="item-icon">💌</span>
      <div class="item-title">520 情话炸弹</div>
      <div class="item-desc">AI 情话生成 · 许愿墙 · 缘分测试</div>
    </a>
    <!-- 更多作品可继续添加 -->
  </div>

  <footer>© lc</footer>

</body>
</html>
